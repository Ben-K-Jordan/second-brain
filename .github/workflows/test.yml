name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # Skip the heavy [whisper] / [ner] / [tray] extras in CI - those
        # pull megabytes of native deps and the test suite doesn't need them.
        # The fake embedder in conftest covers what would otherwise need
        # sentence-transformers / Voyage.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,dashboard]"

      - name: Lint (ruff)
        # Format check is intentionally not enforced; we'll opt into it
        # once the codebase has been ruff-formatted in a dedicated commit.
        run: python -m ruff check src tests

      - name: Test (pytest, fast tests only)
        run: |
          python -m pytest -m "not slow" -ra
